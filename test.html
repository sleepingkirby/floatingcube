<script>

var setPosC=[];
setPosC['y']=0;

function setPos1(e){
setPosC.y=e.offsetY;
setPosC.x=e.offsetX;
}

function setPos(e){
var pos=e.target.getBoundingClientRect();

e.target.style.top=(pos.y+e.offsetY-setPosC.y)+"px";
e.target.style.left=(pos.x+e.offsetX-setPosC.x)+"px";
//e.target.style.top="100px";
}

function fPnlMin(){
const id="fPnlLftPnl"
const el=document.getElementById(id);
el.style.maxWidth="0px";
el.style.padding="0px";
document.getElementById("fPnlEdt").style.maxHeight="0px";
}

function fPnlMax(){
const id="fPnlLftPnl"
const el=document.getElementById(id);
el.style.maxWidth="800px";
el.style.padding="0px 6px 16px 6px";
document.getElementById("fPnlEdt").style.maxHeight="200px";
}

</script>
