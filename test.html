<script>

var setPosC=[];
setPosC['y']=0;

function setPos1(e){
setPosC.y=e.offsetY;
setPosC.x=e.offsetX;
}

function setPos(e){
var pos=e.target.getBoundingClientRect();

e.target.style.top=(pos.y+e.offsetY-setPosC.y)+"px";
e.target.style.left=(pos.x+e.offsetX-setPosC.x)+"px";
//e.target.style.top="100px";
}

function fPnlMin(e){
const id="fPnlLftPnl"
const el=document.getElementById(id);
el.style.maxWidth="0px";
el.style.maxHeight="0px";
el.style.padding="0px";
document.getElementById("fPnlEdt").style.maxHeight="0px";
document.getElementById("fPnlEdt").style.maxWidth="0px";
e.style.display="none";
e.nextElementSibling.style.display="flex";
}

function fPnlMax(e){
const id="fPnlLftPnl"
const el=document.getElementById(id);
el.style.maxWidth="500px";
el.style.maxHeight="500px";
el.style.padding="0px 6px 16px 6px";
document.getElementById("fPnlEdt").style.maxHeight="500px";
document.getElementById("fPnlEdt").style.maxWidth="500px";
e.style.display="none";
e.previousElementSibling.style.display="flex";
}

</script>
